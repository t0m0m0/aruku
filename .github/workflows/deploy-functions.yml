name: Deploy Firebase Functions and Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-functions.yml'
  pull_request:
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-functions.yml'

env:
  # latest を使わないのは、ルールテストとデプロイで CLI が食い違うと
  # ルール評価の差で CI が緑のまま本番だけ壊れうるため。
  FIREBASE_TOOLS_VERSION: 15.17.0

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Run tests
        run: npm test
        working-directory: functions

  rules:
    name: Firestore rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Run Firestore rules tests
        run: npm run test:rules
        working-directory: functions

  deploy:
    name: Deploy
    needs: [build, rules]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # main への push だけを条件にしないのは、firestore.rules が本番の
    # アクセス制御そのもので、退行が即座に全ユーザーへ届くため。
    # 注意: 承認は Environment 側で required reviewers を設定して初めて発動する。
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # firestore:rules だけに絞らないのは、firestore.indexes.json を path
      # トリガーに含めた以上、インデックスも同じ経路で反映しないと
      # 「CI は緑・本番だけ未反映」を indexes 側で再生産するため。
      - name: Deploy Firebase Functions and Firestore rules/indexes
        run: >-
          npx --yes firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}
          deploy --only functions,firestore --non-interactive
